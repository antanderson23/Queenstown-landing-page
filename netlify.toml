# Netlify build + caching config. Pure static site; no functions, no build step.

[build]
  publish = "."

# Long-cache static assets; HTML stays fresh so content edits ship immediately.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
